name: Main

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  static:
    name: Static layer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-deps-${{ hashFiles('package-lock.json') }}-playwright-${{ hashFiles('playwright.config.ts') }}
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Dead code
        run: npm run knip
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: static
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-deps-${{ hashFiles('package-lock.json') }}-playwright-${{ hashFiles('playwright.config.ts') }}
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Run Vitest
        run: npm run test:unit

  end-to-end:
    name: End-to-end tests
    runs-on: ubuntu-latest
    needs: static
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-deps-${{ hashFiles('package-lock.json') }}-playwright-${{ hashFiles('playwright.config.ts') }}
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Create .env for preview server
        run: |
          cat > .env <<'EOF'
          DATABASE_URL=file:./tmp/ci.db
          ORIGIN=http://127.0.0.1:4173
          BETTER_AUTH_SECRET=ci-test-secret-ci-test-secret-ci-test-secret-32chars
          ENABLE_TEST_SEED=true
          OPEN_LIBRARY_BASE_URL=https://openlibrary.org
          EOF
          mkdir -p tmp
      - name: Run Playwright
        run: npm run test:e2e
      - name: Generate failure dossier
        if: failure()
        run: npm run dossier
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
      - name: Upload failure dossier
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-dossier
          path: playwright-report/dossier.md
          retention-days: 7
